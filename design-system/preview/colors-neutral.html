<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display:grid; grid-template-columns:repeat(11,1fr); gap:6px; }
  .sw { height:54px; border-radius:8px; border:1px solid rgba(15,23,42,.06); }
  .lab { display:grid; grid-template-columns:repeat(11,1fr); gap:6px; }
  .lab span { font-family:var(--font-mono); font-size:10px; color:var(--fg-muted); text-align:center; }
</style>
</head><body>
<div class="card">
  <div class="row spread">
    <div class="t-label">Neutral — Slate</div>
    <div class="mono" style="font-size:11px;color:var(--fg-muted);">canonical neutral · text, borders, surfaces</div>
  </div>
  <div class="scale">
    <div class="sw" style="background:#F8FAFC"></div>
    <div class="sw" style="background:#F1F5F9"></div>
    <div class="sw" style="background:#E2E8F0"></div>
    <div class="sw" style="background:#CBD5E1"></div>
    <div class="sw" style="background:#94A3B8"></div>
    <div class="sw" style="background:#64748B"></div>
    <div class="sw" style="background:#475569"></div>
    <div class="sw" style="background:#334155"></div>
    <div class="sw" style="background:#1E293B"></div>
    <div class="sw" style="background:#0F172A"></div>
    <div class="sw" style="background:#020617"></div>
  </div>
  <div class="lab">
    <span>50</span><span>100</span><span>200</span><span>300</span><span>400</span>
    <span>500</span><span>600</span><span>700</span><span>800</span><span style="color:var(--slate-900);font-weight:600">900</span><span>950</span>
  </div>
</div>
</body></html>
