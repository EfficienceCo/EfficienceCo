<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="../colors_and_type.css">

</head><body>
<div class="card" style="gap:14px;">

    <div class="t-label">Data & Mono — JetBrains Mono</div>

  </div>
  <div class="row" style="gap:28px;align-items:flex-end;">

      <span class="kicker" style="color:var(--fg-subtle);">Em andamento</span>
      <span style="font-family:var(--font-display);font-weight:600;font-size:40px;letter-spacing:-0.02em;color:var(--slate-900);font-variant-numeric:tabular-nums;">142</span>
    </div>
    <div class="col" style="gap:2px;">
      <span class="kicker" style="color:var(--fg-subtle);">Em atraso</span>
      <span style="font-family:var(--font-display);font-weight:600;font-size:40px;letter-spacing:-0.02em;color:var(--warning-700);font-variant-numeric:tabular-nums;">07</span>
    </div>
    <div class="col" style="gap:6px;">
      <span class="meta">license token</span>
      <span style="font-family:var(--font-mono);font-weight:500;font-size:13px;color:var(--slate-700);background:var(--slate-100);padding:5px 9px;border-radius:6px;">EFC-2F9A-77C1-B0E4</span>
    </div>
  </div>
  <div style="font-family:var(--font-mono);font-size:12px;line-height:1.7;color:var(--slate-600);background:var(--slate-900);border-radius:var(--r-md);padding:10px 12px;">
    <span style="color:#7DD3FC;">10:42:07</span> <span style="color:#34D399;">INFO</span>  agente.licenca · validação OK · próxima em 24h<br>
    <span style="color:#7DD3FC;">10:42:08</span> <span style="color:#FBBF24;">WARN</span>  obrigacoes · 3 vencimentos em &lt; 48h
  </div>
</div>
