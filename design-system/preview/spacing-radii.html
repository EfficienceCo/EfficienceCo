<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .grid{display:flex;gap:14px;}
  .item{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:100%;height:60px;background:var(--brand-50);border:1.5px solid var(--brand-300);border-bottom-left-radius:0;border-bottom-right-radius:0;}
  .nm{font-family:var(--font-mono);font-size:11px;color:var(--slate-900);}
  .vl{font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle);}
</style>
</head><body>
<div class="card">
  <div class="row spread"><div class="t-label">Corner radii</div><span class="kicker">rounder = more prominent</span></div>
  <div class="grid">
    <div class="item"><div class="box" style="border-top-left-radius:6px;border-top-right-radius:6px;"></div><span class="nm">sm</span><span class="vl">6px</span></div>
    <div class="item"><div class="box" style="border-top-left-radius:8px;border-top-right-radius:8px;"></div><span class="nm">md</span><span class="vl">8px · buttons</span></div>
    <div class="item"><div class="box" style="border-top-left-radius:12px;border-top-right-radius:12px;"></div><span class="nm">lg</span><span class="vl">12px · cards</span></div>
    <div class="item"><div class="box" style="border-top-left-radius:16px;border-top-right-radius:16px;"></div><span class="nm">xl</span><span class="vl">16px</span></div>
    <div class="item"><div class="box" style="border-top-left-radius:20px;border-top-right-radius:20px;"></div><span class="nm">2xl</span><span class="vl">20px</span></div>
    <div class="item"><div class="box" style="border-top-left-radius:999px;border-top-right-radius:999px;"></div><span class="nm">full</span><span class="vl">pills</span></div>
  </div>
</div>
</body></html>
