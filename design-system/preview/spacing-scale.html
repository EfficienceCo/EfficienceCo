<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .scale{display:flex;flex-direction:column;gap:7px;}
  .unit{display:flex;align-items:center;gap:12px;}
  .bar{height:14px;background:var(--brand-400);border-radius:3px;}
  .nm{font-family:var(--font-mono);font-size:11px;color:var(--slate-700);width:54px;}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle);}
</style>
</head><body>
<div class="card" style="gap:10px;">
  <div class="row spread"><div class="t-label">Spacing — 4pt scale</div><span class="kicker">card padding 20–24</span></div>
  <div class="scale">
    <div class="unit"><span class="nm">space-1</span><span class="bar" style="width:4px;"></span><span class="px">4</span></div>
    <div class="unit"><span class="nm">space-2</span><span class="bar" style="width:8px;"></span><span class="px">8</span></div>
    <div class="unit"><span class="nm">space-3</span><span class="bar" style="width:12px;"></span><span class="px">12</span></div>
    <div class="unit"><span class="nm">space-4</span><span class="bar" style="width:16px;"></span><span class="px">16</span></div>
    <div class="unit"><span class="nm">space-5</span><span class="bar" style="width:20px;"></span><span class="px">20</span></div>
    <div class="unit"><span class="nm">space-6</span><span class="bar" style="width:24px;"></span><span class="px">24</span></div>
    <div class="unit"><span class="nm">space-8</span><span class="bar" style="width:32px;"></span><span class="px">32</span></div>
    <div class="unit"><span class="nm">space-12</span><span class="bar" style="width:48px;"></span><span class="px">48</span></div>
    <div class="unit"><span class="nm">space-16</span><span class="bar" style="width:64px;"></span><span class="px">64</span></div>
  </div>
</div>
</body></html>
